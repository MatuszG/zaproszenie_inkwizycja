<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Natalia &amp; Mateusz — zaproszenie</title>
  <meta property="og:title" content="Natalia &amp; Mateusz — zaproszenie ślubne">
  <meta property="og:description" content="Kliknij, by otworzyć zaproszenie">
  <meta property="og:type" content="website">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf8f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,253,247,0.6) 0%, rgba(253,248,242,0) 55%, rgba(233,216,186,0.25) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .corner-flower {
      position: fixed;
      width: 190px; height: 190px;
      pointer-events: none;
      z-index: 2;
      opacity: 0.85;
    }
    #cf-tl { top: -30px; left: -30px; }
    #cf-br { bottom: -30px; right: -30px; transform: rotate(180deg); }

    .petal {
      position: fixed;
      top: -30px;
      width: 9px; height: 15px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      pointer-events: none;
      z-index: 2;
      animation-name: fall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }
    @keyframes fall {
      0%   { transform: translate3d(0, -4vh, 0) rotate(0deg); }
      25%  { transform: translate3d(3vw, 25vh, 0) rotate(95deg); }
      50%  { transform: translate3d(-2vw, 52vh, 0) rotate(180deg); }
      75%  { transform: translate3d(3vw, 78vh, 0) rotate(270deg); }
      100% { transform: translate3d(-1vw, 108vh, 0) rotate(360deg); }
    }

    #stage-envelope {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 10;
      position: relative;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.9s ease, transform 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    #stage-envelope.entered { opacity: 1; transform: translateY(0); }

    #hint {
      margin-top: 18px;
      font-size: 11px; color: #b8985a;
      letter-spacing: 0.15em; text-transform: uppercase;
      font-family: sans-serif;
      transition: opacity 0.4s;
    }

    #envelope-wrap {
      position: relative;
      width: 340px;
      cursor: pointer;
      perspective: 1000px;
      --s: 1;
      transform: scale(var(--s));
      margin: calc((var(--s) - 1) * 130px) 0;
    }
    @media (min-width: 700px)  { #envelope-wrap { --s: 1.15; } }
    @media (min-width: 1000px) { #envelope-wrap { --s: 1.35; } }
    @media (min-width: 1500px) { #envelope-wrap { --s: 1.55; } }
    @media (max-width: 380px)  { #envelope-wrap { --s: 0.88; } }
    #envelope-body {
      width: 340px; height: 230px;
      background: #fffdf7;
      border: 1px solid #c9a84c;
      border-radius: 3px;
      position: relative;
    }
    #pocket { position: absolute; inset: 0; z-index: 14; pointer-events: none; }
    #pocket svg { display: block; width: 100%; height: 100%; }

    #letter {
      position: absolute;
      left: 50%; bottom: 16px;
      width: 196px;
      aspect-ratio: 1035 / 968;
      background: #fffdf7;
      border: 1px solid #d4b870;
      border-radius: 2px;
      z-index: 5;
      overflow: hidden;
      transform: translate(-50%, 0);
      filter: blur(0);
      opacity: 1;
      transition: transform 0.85s cubic-bezier(0.22,1,0.36,1),
                  filter 0.5s ease 0.45s,
                  opacity 0.5s ease 0.45s;
    }
    #letter img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #envelope-wrap.opening #letter {
      transform: translate(-50%, -95%);
      filter: blur(7px);
      opacity: 0;
    }

    #letter-mask {
      position: absolute; inset: 0;
      background: #f6edd9;
      border-radius: 3px;
      z-index: 13;
    }

    #flap {
      position: absolute; top:-1px; left:-1px; width:340px;
      transform-origin: top center;
      transform: rotateX(0deg);
      transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
      z-index: 20;
    }
    #envelope-wrap.opening #flap { z-index: 3; }
    #envelope-wrap:hover #flap,
    #envelope-wrap.opening #flap { transform: rotateX(-170deg); }
    #envelope-wrap:hover #seal,
    #envelope-wrap.opening #seal { opacity: 0; transform: translate(-50%,-50%) scale(0.6); }

    #seal {
      position: absolute; top:50%; left:50%;
      transform: translate(-50%,-50%);
      width:50px; height:50px; z-index:30;
      transition: opacity 0.35s, transform 0.35s;
      pointer-events: none;
    }

    #booklet-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      padding: 32px 16px 48px;
      z-index: 10;
      position: relative;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #booklet-wrap.visible { opacity: 1; }

    #cover-stage {
      perspective: 1400px;
      width: min(560px, 92vw, 78vh);
    }
    #cover-page {
      width: 100%;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      cursor: pointer;
      transform-origin: left center;
      transform: rotateY(0deg);
      transition: transform 0.85s cubic-bezier(0.33,0.9,0.35,1), box-shadow 0.85s;
      backface-visibility: hidden;
      overflow: hidden;
      background: #fffdf7;
      position: relative;
      box-shadow: 0 6px 28px rgba(138,106,31,0.12);
    }
    #cover-page:hover { box-shadow: 0 10px 36px rgba(138,106,31,0.2); }
    #cover-page.opened {
      transform: rotateY(-160deg);
      pointer-events: none;
      box-shadow: -14px 6px 30px rgba(138,106,31,0.18);
    }
    #cover-page canvas { display: block; width: 100%; height: auto; }

    #cover-hint {
      text-align: center;
      margin-top: 12px;
      font-size: 10px; color: #c9a84c;
      letter-spacing: 0.15em; text-transform: uppercase;
      font-family: sans-serif;
      transition: opacity 0.3s;
    }

    #spread-stage {
      display: none;
      width: min(1100px, 96vw);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    #spread-stage.visible { opacity: 1; transform: translateY(0); }
    #inner-spread {
      display: flex;
      border: 1px solid #c9a84c;
      border-radius: 4px;
      overflow: hidden;
      background: #fffdf7;
      box-shadow: 0 8px 32px rgba(138,106,31,0.14);
    }
    .gold-bar { width: 3px; background: #c9a84c; flex-shrink: 0; }
    .inner-page { flex: 1; overflow: hidden; }
    .inner-page canvas { display: block; width: 100%; height: auto; }

    #back-btn {
      font-size: 11px; color: #b8985a;
      background: none; border: 1px solid #d4b870;
      padding: 8px 20px; border-radius: 2px;
      cursor: pointer; letter-spacing: 0.15em;
      text-transform: uppercase; font-family: sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    #back-btn:hover { color: #8a6a1f; border-color: #c9a84c; }

    #music-btn {
      position: fixed;
      top: 16px; right: 16px;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid #d4b870;
      background: rgba(255,253,247,0.9);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      transition: border-color 0.2s;
    }
    #music-btn:hover { border-color: #c9a84c; }
    #music-btn svg { width: 18px; height: 18px; stroke: #b8985a; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    #music-btn .muted-line { display: none; }
    #music-btn.muted .muted-line { display: block; }

    #loading {
      position: fixed; inset: 0;
      background: #fdf8f2;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      z-index: 100;
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-seal { width: 48px; height: 48px; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
    .loading-text { font-size: 11px; color: #b8985a; letter-spacing: 0.2em; text-transform: uppercase; font-family: sans-serif; }

    #error-box {
      display: none;
      text-align: center;
      font-family: sans-serif;
      font-size: 13px;
      color: #9a6a3a;
      line-height: 1.8;
      padding: 16px;
      z-index: 10;
      position: relative;
    }
    #error-box a { color: #8a6a1f; }

    @media (max-width: 500px) {
      .corner-flower { width: 130px; height: 130px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      #stage-envelope { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

    <div id="spread-stage">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const PDF_PATH = 'zaproszenie.pdf';
    const SCALE = 2;
    const CROP_PX = 30;

    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const colors = ['#c9a84c','#e8b4b8','#d4a574','#b8985a','#e2c990'];
    for (let i = 0; i < 26; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      const dur = 9 + Math.random() * 10;
      const delay = -Math.random() * dur;
      p.style.cssText =
        'left:' + (Math.random()*100) + 'vw;' +
        'background:' + colors[i % colors.length] + ';' +
        'opacity:' + (0.12 + Math.random()*0.16).toFixed(2) + ';' +
        'animation-duration:' + dur.toFixed(1) + 's;' +
        'animation-delay:' + delay.toFixed(1) + 's;';
      document.body.appendChild(p);
    }

    async function renderRegion(pdf, pageNum, container, region) {
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: SCALE });
      const c = CROP_PX * SCALE;

      let sx, sw;
      if (region === 'right-half') {
        sx = viewport.width / 2;
        sw = viewport.width / 2 - c;
      } else {
        sx = c;
        sw = viewport.width - c * 2;
      }
      const sy = c;
      const sh = viewport.height - c * 2;

      const canvas = document.createElement('canvas');
      canvas.width = sw;
      canvas.height = sh;

      const ctx = canvas.getContext('2d');
      ctx.translate(-sx, -sy);

      await page.render({ canvasContext: ctx, viewport }).promise;
      container.appendChild(canvas);
      return canvas;
    }

    async function init() {
      try {
        const pdf = await pdfjsLib.getDocument(PDF_PATH).promise;
        const coverCanvas = await renderRegion(pdf, 1, document.getElementById('page-cover'), 'right-half');
        if (pdf.numPages >= 2) {
          await renderRegion(pdf, 2, document.getElementById('page-spread'), 'full');
        }
        document.getElementById('letter-img').src = coverCanvas.toDataURL('image/jpeg', 0.7);
      } catch (e) {
        console.error('PDF load error:', e);
        document.getElementById('stage-envelope').style.display = 'none';
        document.getElementById('error-box').style.display = 'block';
      }
      document.getElementById('loading').classList.add('hidden');
      requestAnimationFrame(() =>
        document.getElementById('stage-envelope').classList.add('entered')
      );
    }

    const music = document.getElementById('bg-music');
    const musicBtn = document.getElementById('music-btn');
    let musicStarted = false, mp3Failed = false;

    let actx = null, master = null, genBus = null, noiseBuf = null, genTimer = null, genOn = false;
    let scheduled = [];
    const BEAT = 0.82;
    const N = {
      G2:98.00, C3:130.81, E3:164.81, F3:174.61, G3:196.00, A3:220.00, B3:246.94,
      C4:261.63, D4:293.66, E4:329.63, F4:349.23, G4:392.00, A4:440.00, B4:493.88,
      C5:523.25, D5:587.33, E5:659.25, G5:783.99
    };
    const MELODY = [
      ['G4',1],['C5',0.75],['C5',0.25],['C5',2],
      ['G4',1],['D5',0.75],['B4',0.25],['C5',2],
      ['G4',1],['G5',1],['E5',1],['C5',1],
      ['D5',0.75],['B4',0.25],['C5',3]
    ];
    const BASS   = [ [0,'C3'], [4,'G2'], [8,'C3'], [12,'G2'], [14,'C3'] ];
    const CHORDS = [
      [0,  ['E3','G3','C4']],
      [4,  ['D4','F3','B3']],
      [8,  ['E3','G3','C4']],
      [12, ['F3','B3','D4']],
      [14, ['E3','G3','C4']]
    ];

    function ensureCtx() {
      if (!actx) {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain();
        master.gain.value = 0.5;
        master.connect(actx.destination);

        const irLen = Math.floor(actx.sampleRate * 2.2);
        const ir = actx.createBuffer(2, irLen, actx.sampleRate);
        for (let ch = 0; ch < 2; ch++) {
          const d = ir.getChannelData(ch);
          for (let i = 0; i < irLen; i++) {
            d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.8);
          }
        }
        const conv = actx.createConvolver();
        conv.buffer = ir;
        const rev = actx.createGain();
        rev.gain.value = 0.4;

        genBus = actx.createGain();
        genBus.gain.value = 1;
        genBus.connect(master);
        genBus.connect(conv);
        conv.connect(rev);
        rev.connect(master);

        noiseBuf = actx.createBuffer(1, Math.floor(actx.sampleRate * 0.05), actx.sampleRate);
        const nd = noiseBuf.getChannelData(0);
        for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
      }
      if (actx.state === 'suspended') actx.resume();
    }

    function tone(t, f, dur, vol, pan) {
      t += (Math.random() - 0.5) * 0.012;
      vol *= 0.92 + Math.random() * 0.16;

      const out = actx.createGain();
      out.gain.value = 1;
      if (actx.createStereoPanner) {
        const panner = actx.createStereoPanner();
        panner.pan.value = pan || 0;
        out.connect(panner); panner.connect(genBus);
      } else {
        out.connect(genBus);
      }

      const flt = actx.createBiquadFilter();
      flt.type = 'lowpass';
      flt.Q.value = 0.7;
      flt.frequency.setValueAtTime(Math.min(f * 9, 6500), t);
      flt.frequency.setTargetAtTime(f * 2.2, t + 0.02, 0.35);
      flt.connect(out);

      const env = actx.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(vol, t + 0.012);
      env.gain.setTargetAtTime(vol * 0.45, t + 0.03, 0.32);
      env.gain.setTargetAtTime(0.0001, t + dur * 0.8, 0.3);
      env.connect(flt);

      const partials = [[1, 1], [2, 0.45], [3, 0.18], [4.01, 0.08]];
      for (const [n, g] of partials) {
        const o = actx.createOscillator();
        o.type = 'sine';
        o.frequency.value = f * n * (1 + 0.0006 * n * n);
        const og = actx.createGain();
        og.gain.value = g;
        o.connect(og); og.connect(env);
        o.start(t); o.stop(t + dur + 1.6);
        scheduled.push(o);
      }

      const nz = actx.createBufferSource();
      nz.buffer = noiseBuf;
      const nzf = actx.createBiquadFilter();
      nzf.type = 'bandpass';
      nzf.frequency.value = Math.min(f * 5, 4000);
      nzf.Q.value = 1.2;
      const nzg = actx.createGain();
      nzg.gain.setValueAtTime(vol * 0.5, t);
      nzg.gain.exponentialRampToValueAtTime(0.0001, t + 0.05);
      nz.connect(nzf); nzf.connect(nzg); nzg.connect(out);
      nz.start(t); nz.stop(t + 0.06);
      scheduled.push(nz);
    }

    const DYN = [0.8,0.9,0.95,1, 0.85,0.95,0.95,1, 0.9,1.1,1.05,1, 0.95,0.9,0.85];
    function schedulePhrase() {
      const t0 = actx.currentTime + 0.06;
      let beat = 0, i = 0;
      for (const [note, len] of MELODY) {
        tone(t0 + beat * BEAT, N[note], len * BEAT + 0.5, 0.10 * (DYN[i] || 1), 0.18);
        beat += len; i++;
      }
      for (const [b, note] of BASS) {
        tone(t0 + b * BEAT, N[note], 3.4, 0.07, -0.25);
      }
      for (const [b, notes] of CHORDS) {
        notes.forEach((note, k) =>
          tone(t0 + b * BEAT + 0.02 + k * 0.012, N[note], 3.2, 0.024, -0.08 + k * 0.08)
        );
      }
    }

    function startGen() {
      ensureCtx();
      if (genOn) return;
      genOn = true;
      const t = actx.currentTime;
      genBus.gain.cancelScheduledValues(t);
      genBus.gain.setValueAtTime(1, t);
      schedulePhrase();
      genTimer = setInterval(schedulePhrase, 16 * BEAT * 1000 + 600);
      musicBtn.classList.remove('muted');
    }

    function stopGen() {
      genOn = false;
      if (genTimer) clearInterval(genTimer);
      if (actx && genBus) {
        const t = actx.currentTime;
        genBus.gain.cancelScheduledValues(t);
        genBus.gain.setTargetAtTime(0, t, 0.04);
        const olds = scheduled;
        scheduled = [];
        setTimeout(() => {
          olds.forEach(o => { try { o.stop(); } catch (e) {} });
        }, 250);
      }
      musicBtn.classList.add('muted');
    }

    music.addEventListener('error', () => { mp3Failed = true; });

    function startMusic() {
      if (musicStarted) return;
      musicStarted = true;
      musicBtn.style.display = 'flex';
      if (!mp3Failed) {
        music.volume = 0.35;
        music.play().then(() => {
          musicBtn.classList.remove('muted');
        }).catch(() => {
          mp3Failed = true;
          startGen();
        });
      } else {
        startGen();
      }
    }

    window.toggleMusic = function() {
      if (mp3Failed) {
        if (genOn) stopGen(); else startGen();
        return;
      }
      if (music.paused) {
        music.play().catch(() => {});
        musicBtn.classList.remove('muted');
      } else {
        music.pause();
        musicBtn.classList.add('muted');
      }
    };

    window.openEnvelope = function() {
      startMusic();
      const wrap = document.getElementById('envelope-wrap');
      wrap.classList.add('opening');
      document.getElementById('hint').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('stage-envelope').style.display = 'none';
        const booklet = document.getElementById('booklet-wrap');
        booklet.style.display = 'flex';
        requestAnimationFrame(() => booklet.classList.add('visible'));
      }, 950);
    };

    window.openCover = function() {
      document.getElementById('cover-page').classList.add('opened');
      document.getElementById('cover-hint').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('cover-stage').style.display = 'none';
        const spread = document.getElementById('spread-stage');
        spread.style.display = 'block';
        requestAnimationFrame(() => spread.classList.add('visible'));
      }, 480);
    };

    window.closeAll = function() {
      if (genOn) stopGen();
      if (!music.paused) music.pause();
      musicBtn.classList.add('muted');
      musicStarted = false;
      const booklet = document.getElementById('booklet-wrap');
      booklet.classList.remove('visible');
      booklet.style.display = 'none';
      document.getElementById('cover-stage').style.display = '';
      document.getElementById('cover-page').classList.remove('opened');
      document.getElementById('cover-hint').style.opacity = '1';
      const spread = document.getElementById('spread-stage');
      spread.classList.remove('visible');
      spread.style.display = 'none';

      const stage = document.getElementById('stage-envelope');
      stage.style.display = '';
      document.getElementById('hint').style.opacity = '1';
      document.getElementById('envelope-wrap').classList.remove('opening');
    };

    window.addEventListener('load', init);
  </script>
</body>
</html>
